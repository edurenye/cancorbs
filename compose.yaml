services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BOOKINGS_FILE: /data/bookings.json
      NODE_ENV: production
    volumes:
      - ./data:/data

  # Terminates TLS with Let's Encrypt for cancorbs.ydns.eu → web:3000
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3401:80"
      - "4403:443"
      - "4403:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111116"/>
      <stop offset="1" stop-color="#060607"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.65
        0 0 0 0 0.65
        0 0 0 0 0.65
        0 0 0 0.18 0"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.55"/>

  <!-- Tree trunks -->
  <rect x="120" y="280" width="70" height="420" fill="#1c1c22" opacity="0.95"/>
  <rect x="210" y="240" width="50" height="480" fill="#17171c" opacity="0.95"/>
  <rect x="860" y="260" width="55" height="470" fill="#1c1c22" opacity="0.95"/>
  <rect x="940" y="220" width="45" height="520" fill="#17171c" opacity="0.95"/>

  <!-- Simple crow silhouette -->
  <path d="M580 430
           C610 390, 660 375, 700 395
           C735 410, 755 445, 750 485
           C742 555, 662 585, 610 560
           C560 535, 545 480, 580 430 Z"
        fill="#0b0b0e" opacity="0.98"/>
  <path d="M675 420
           C700 400, 730 400, 760 415
           C740 440, 720 460, 705 470
           C690 452, 682 435, 675 420 Z"
        fill="#0b0b0e" opacity="0.98"/>

  <text x="600" y="715" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="40" fill="#e4e4e7" opacity="0.85">
    Crow in the woods
  </text>
</svg>


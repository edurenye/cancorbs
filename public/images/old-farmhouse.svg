<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1b1f"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.7
        0 0 0 0 0.7
        0 0 0 0 0.7
        0 0 0 0.18 0"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.55"/>

  <!-- Simple farmhouse silhouette -->
  <path d="M160 650 L160 470 L310 350 L310 420 L420 335 L420 650 Z" fill="#26262b" opacity="0.95"/>
  <path d="M300 350 L430 250 L600 380 L580 420 L430 325 L300 420 Z" fill="#1f1f24" opacity="0.95"/>

  <!-- Windows -->
  <rect x="225" y="520" width="70" height="90" fill="#0f0f12" stroke="#3b3b43" stroke-width="4" opacity="0.9"/>
  <rect x="465" y="520" width="70" height="90" fill="#0f0f12" stroke="#3b3b43" stroke-width="4" opacity="0.9"/>

  <!-- Caption -->
  <text x="600" y="720" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="42" fill="#e4e4e7" opacity="0.85">
    Old farmhouse
  </text>
</svg>


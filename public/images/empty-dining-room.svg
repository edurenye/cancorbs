<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16161a"/>
      <stop offset="1" stop-color="#070709"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.7
        0 0 0 0 0.7
        0 0 0 0 0.7
        0 0 0 0.18 0"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity="0.55"/>

  <!-- Table -->
  <rect x="300" y="390" width="600" height="65" rx="14" fill="#1d1d22" opacity="0.98"/>
  <rect x="410" y="455" width="380" height="18" fill="#141418" opacity="0.95"/>

  <!-- Chairs -->
  <rect x="220" y="430" width="110" height="110" rx="14" fill="#16161b" opacity="0.95"/>
  <rect x="870" y="430" width="110" height="110" rx="14" fill="#16161b" opacity="0.95"/>

  <!-- Empty wall panels -->
  <rect x="210" y="160" width="780" height="140" rx="26" fill="#0f0f12" opacity="0.85"/>

  <text x="600" y="715" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="40" fill="#e4e4e7" opacity="0.85">
    Empty dining room
  </text>
</svg>

